---
name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  go:
    uses: openconfig/common-ci/.github/workflows/go.yml@v0.3.0
    permissions:
      contents: read
      packages: read
      statuses: write

  lint:
    uses: openconfig/common-ci/.github/workflows/linter.yml@v0.3.0
    permissions:
      contents: read
      packages: read
