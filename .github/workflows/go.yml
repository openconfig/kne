---
name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  go:
    uses: openconfig/common-ci/.github/workflows/go.yml@857df491097bf7b7260afb6661be1d616f67faa2 # v0.4.0
    permissions:
      contents: read
      packages: read
      statuses: write
    with:
      go-versions: "['1.26']"
      coverage-excludes-regex: /cloudbuild
      tests-excludes-regex: /cloudbuild
      race-tests-excludes-regex: /cloudbuild
      skip-race-tests: true

  lint:
    uses: openconfig/common-ci/.github/workflows/linter.yml@857df491097bf7b7260afb6661be1d616f67faa2 # v0.4.0
    permissions:
      contents: read
      packages: read

  meshnet:
    name: Meshnet Go Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      - name: Install dependencies
        run: sudo apt-get install -y libpcap-dev
      - name: Run Go tests
        working-directory: ./third_party/meshnet
        run: make test

