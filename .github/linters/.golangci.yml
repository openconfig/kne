---
version: "2"

#########################
#########################
## Golang Linter rules ##
#########################
#########################

# configure golangci-lint
# see https://github.com/golangci/golangci-lint/blob/master/.golangci.example.yml
run:
  timeout: 10m
issues:
  new-from-rev: origin/main
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - goconst
    - linters:
      - revive
      text: "var-naming: don't use leading k"
    - linters:
      - staticcheck
      text: "SA1019:"
linters:
  disable-all: true
  enable:
    - gosec
    - unconvert
    - gocritic
    - govet
    - revive
    - staticcheck
    - unparam
    - unused
    - wastedassign
    - whitespace
  settings:
    errcheck:
      # report about assignment of errors to blank identifier: `num, _ := strconv.Atoi(numStr)`;
      # default is false: such cases aren't reported by default.
      check-blank: true
    gocritic:
      disabled-checks:
        - singleCaseSwitch
        - appendAssign
    revive:
      ignore-generated-header: true
      severity: warning
formatters:
  enable:
    - gofmt
    - goimports
