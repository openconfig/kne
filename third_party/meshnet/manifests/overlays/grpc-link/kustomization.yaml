apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/1
        value:
          name: INTER_NODE_LINK_TYPE
          value: GRPC
    target:
      kind: DaemonSet
      name: meshnet
      namespace: meshnet
resources:
  - ../../base/
images:
  - name: us-west1-docker.pkg.dev/kne-external/kne/meshnet
    newName: us-west1-docker.pkg.dev/kne-external/kne/meshnet
    newTag: a0d672d-dirty
